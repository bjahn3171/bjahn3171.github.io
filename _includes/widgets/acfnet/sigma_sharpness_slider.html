<div class="softargmin-widget">
  <svg class="softargmin-svg" viewBox="0 0 760 300" role="img" preserveAspectRatio="xMidYMid meet">
    <title>Interactive unimodal distribution whose sharpness changes with sigma</title>
    <desc>A single peak centered at the true disparity; a slider adjusts how sharp or flat it is.</desc>

    <!-- axes -->
    <line x1="115" y1="225" x2="700" y2="225" class="softargmin-axis"/>
    <line x1="125" y1="45" x2="125" y2="235" class="softargmin-axis"/>

    <!-- labels -->
    <text class="softargmin-text" x="125" y="35" text-anchor="start">probability P(d)</text>
    <text class="softargmin-text" x="700" y="255" text-anchor="end">disparity d</text>

    <!-- true disparity guide -->
    <line x1="410" y1="55" x2="410" y2="225" class="softargmin-guide"/>
    <text class="softargmin-text softargmin-true" x="410" y="275" text-anchor="middle">true disparity</text>

    <!-- curve -->
    <path class="softargmin-peak" d=""/>
  </svg>

  <div class="softargmin-control">
    <span>sharp</span>
    <input type="range" min="8" max="90" value="24">
    <span>flat</span>
    <span class="softargmin-label">σ small</span>
  </div>
</div>

<script>
(function () {
  document.querySelectorAll(".softargmin-widget").forEach(function (widget) {
    if (widget.dataset.ready === "true") return;
    widget.dataset.ready = "true";

    const peak = widget.querySelector(".softargmin-peak");
    const slider = widget.querySelector("input[type='range']");
    const label = widget.querySelector(".softargmin-label");

    function draw(s) {
      const cx = 410;
      const base = 225;
      const top = 55;
      const N = 160;
      const spread = 290;
      const pts = [];

      for (let i = -N; i <= N; i++) {
        const d = (i / N) * spread;
        const y = Math.exp(-Math.abs(d) / s);
        pts.push([cx + d, base - (base - top) * y]);
      }

      const path = pts.map(function (p, i) {
        return (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1);
      }).join(" ");

      peak.setAttribute("d", path);

      const v = Number(s);
      label.textContent =
        v < 20 ? "σ small (sharp)" :
        v < 55 ? "σ medium" :
        "σ large (flat)";
    }

    slider.addEventListener("input", function () {
      draw(slider.value);
    });

    draw(slider.value);
  });
})();
</script>
